<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>آوای یقین - دستیار هوشمند</title>
  <link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Vazirmatn', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #0b0f19;
      color: #f1f5f9;
      height: 100vh;
      height: 100dvh; /* پشتیبانی عالی از ارتفاع واقعی در مرورگرهای موبایل */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ================= مودال ثبت‌نام / ورود ================= */
    #registrationModal {
      position: fixed;
      inset: 0;
      background: rgba(11, 15, 25, 0.95);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal-box {
      background: #161e2e;
      border: 1px solid #2d3748;
      width: 100%;
      max-width: 400px;
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #f5df91;
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .custom-input {
      width: 100%;
      padding: 14px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .custom-input:focus {
      border-color: #d4af37;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #d4af37, #aa7c11);
      color: #000;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 8px;
    }

    /* ================= هدر اصلی ================= */
    header {
      background: #161e2e;
      border-bottom: 1px solid #1e293b;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 60px;
    }

    .header-info h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f5df91;
    }

    .header-info span {
      font-size: 11px;
      color: #64748b;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cbd5e1;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      cursor: pointer;
    }

    /* ================= محفظه پیام‌ها ================= */
    #chatContainer {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    #welcomeScreen {
      margin: auto;
      text-align: center;
      color: #64748b;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #welcomeScreen .icon {
      font-size: 48px;
    }

    #welcomeScreen p {
      font-size: 15px;
    }

    #messagesArea {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    /* ================= حباب پیام‌ها (درشت و مناسب موبایل) ================= */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: fadeIn 0.2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
    }

    .message.ai {
      align-self: flex-start;
    }

    .message-content {
      padding: 14px 18px;
      border-radius: 20px;
      font-size: 15px; /* فونت درشت و خوانا در گوشی */
      line-height: 1.6;
      word-break: break-word;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #1e3a8a, #1d4ed8);
      color: #ffffff;
      border-bottom-left-radius: 4px;
    }

    .message.ai .message-content {
      background: #1e293b;
      color: #f1f5f9;
      border: 1px solid #334155;
      border-bottom-right-radius: 4px;
    }

    /* ================= بخش ورودی پیام (ویژه موبایل) ================= */
    footer {
      background: #161e2e;
      border-top: 1px solid #1e293b;
      padding: 12px 16px;
    }

    #chatForm {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    #chatInput {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 14px 16px;
      color: #fff;
      font-size: 16px; /* جلوگیری از زوم ناخواسته در آیفون و اندروید */
      outline: none;
    }

    #chatInput:focus {
      border-color: #d4af37;
    }

    .btn-send {
      background: linear-gradient(135deg, #d4af37, #aa7c11);
      color: #000;
      border: none;
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 70px;
      height: 50px;
    }

    /* ================= اعلان‌ها (Toast) ================= */
    #toastContainer {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: #1e293b;
      border: 1px solid #d4af37;
      color: #f5df91;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 13px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- اعلان‌ها -->
  <div id="toastContainer"></div>

  <!-- مودال ورود -->
  <div id="registrationModal" style="display: none;">
    <div class="modal-box">
      <div class="modal-title">🕌 سامانه آوای یقین</div>
      <form id="onboardingForm">
        <div class="input-group">
          <label>نام و نام خانوادگی:</label>
          <input type="text" id="userNameInput" class="custom-input" placeholder="مثال: علی" required>
        </div>
        <div class="input-group">
          <label>شماره همراه:</label>
          <input type="tel" id="userPhoneInput" class="custom-input" placeholder="09123456789" required>
        </div>
        <button type="submit" class="btn-submit">ورود به سامانه</button>
      </form>
    </div>
  </div>

  <!-- هدر -->
  <header>
    <div class="header-info">
      <h1>آوای یقین</h1>
      <span id="displayUserName">کاربر</span>
    </div>
    <div class="header-actions">
      <button id="imageModeBtn" class="btn-icon hidden">🎨 عکس</button>
      <button id="newChatBtn" class="btn-icon">✨ چت جدید</button>
    </div>
  </header>

  <!-- چت -->
  <div id="chatContainer">
    <div id="welcomeScreen">
      <div class="icon">💡</div>
      <p>چطور می‌توانم کمکتان کنم؟</p>
    </div>
    <div id="messagesArea"></div>
  </div>

  <!-- بخش ارسال پیام -->
  <footer>
    <form id="chatForm">
      <input type="text" id="chatInput" placeholder="پرسش خود را وارد کنید..." autocomplete="off">
      <button type="submit" class="btn-send">ارسال</button>
    </form>
  </footer>

  <script src="app.js"></script>
</body>
</html>
