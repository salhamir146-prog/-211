<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>آوای یقین</title>
  <link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.0.3/Vazirmatn-font-face.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Vazirmatn', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #0d0f12;
      color: #e2e8f0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ================= مودال ورود لاکچری ================= */
    #registrationModal {
      position: fixed;
      inset: 0;
      background: rgba(13, 15, 18, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .modal-box {
      background: linear-gradient(145deg, #161a22, #0f1217);
      border: 1px solid rgba(212, 175, 55, 0.3);
      width: 100%;
      max-width: 400px;
      padding: 28px 24px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(212, 175, 55, 0.1);
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #f5df91;
      text-align: center;
      margin-bottom: 24px;
      text-shadow: 0 0 10px rgba(245, 223, 145, 0.2);
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .custom-input {
      width: 100%;
      padding: 15px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
    }

    .custom-input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.25);
    }

    .btn-submit {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #f5df91, #d4af37, #aa7c11);
      color: #0d0f12;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }

    /* ================= هدر ================= */
    header {
      background: rgba(22, 26, 34, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-info h1 {
      font-size: 17px;
      font-weight: 700;
      color: #f5df91;
    }

    .header-info span {
      font-size: 12px;
      color: #64748b;
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.25);
      color: #f5df91;
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 13px;
      cursor: pointer;
    }

    /* ================= منطقه چت ================= */
    #chatContainer {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }

    #welcomeScreen {
      margin: auto;
      text-align: center;
      color: #64748b;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #welcomeScreen .icon {
      font-size: 52px;
      filter: drop-shadow(0 0 10px rgba(245, 223, 145, 0.2));
    }

    #welcomeScreen p {
      font-size: 16px;
      color: #94a3b8;
    }

    #messagesArea {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
    }

    /* ================= پیام‌ها (بهینه‌شده و خوش‌دست برای موبایل) ================= */
    .message {
      display: flex;
      flex-direction: column;
      max-width: 90%;
      animation: fadeIn 0.2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
    }

    .message.ai {
      align-self: flex-start;
    }

    .message-content {
      padding: 14px 18px;
      border-radius: 20px;
      font-size: 15px; /* درشت و خوانا تو موبایل */
      line-height: 1.6;
      word-break: break-word;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, #d4af37, #aa7c11);
      color: #0d0f12;
      font-weight: 500;
      border-bottom-left-radius: 4px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
    }

    .message.ai .message-content {
      background: #161a22;
      color: #e2e8f0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    /* ================= باکس ارسال پیام (درشت و عالی) ================= */
    footer {
      background: rgba(22, 26, 34, 0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px 14px;
    }

    #chatForm {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    #chatInput {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 14px 16px;
      color: #fff;
      font-size: 16px; /* اندازه درشت بدون زوم صفحه در گوشی */
      outline: none;
      transition: all 0.3s ease;
    }

    #chatInput:focus {
      border-color: #d4af37;
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-send {
      background: linear-gradient(135deg, #f5df91, #d4af37, #aa7c11);
      color: #0d0f12;
      border: none;
      border-radius: 16px;
      padding: 0 22px;
      height: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.25);
    }

    /* ================= اعلان‌ها (Toast) ================= */
    #toastContainer {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: #161a22;
      border: 1px solid #d4af37;
      color: #f5df91;
      padding: 12px 22px;
      border-radius: 14px;
      font-size: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- اعلان‌ها -->
  <div id="toastContainer"></div>

  <!-- مودال ورود -->
  <div id="registrationModal" style="display: none;">
    <div class="modal-box">
      <div class="modal-title">🕌 سامانه آوای یقین</div>
      <form id="onboardingForm">
        <div class="input-group">
          <label>نام و نام خانوادگی:</label>
          <input type="text" id="userNameInput" class="custom-input" placeholder="مثال: علی" required>
        </div>
        <div class="input-group">
          <label>شماره همراه:</label>
          <input type="tel" id="userPhoneInput" class="custom-input" placeholder="09123456789" required>
        </div>
        <button type="submit" class="btn-submit">ورود به سامانه</button>
      </form>
    </div>
  </div>

  <!-- هدر -->
  <header>
    <div class="header-info">
      <h1>آوای یقین</h1>
      <span id="displayUserName">کاربر</span>
    </div>
    <div class="header-actions">
      <button id="imageModeBtn" class="btn-icon hidden">🎨 عکس</button>
      <button id="newChatBtn" class="btn-icon">✨ چت جدید</button>
    </div>
  </header>

  <!-- چت -->
  <div id="chatContainer">
    <div id="welcomeScreen">
      <div class="icon">✨</div>
      <p>چطور می‌توانم کمکتان کنم؟</p>
    </div>
    <div id="messagesArea"></div>
  </div>

  <!-- بخش ارسال پیام -->
  <footer>
    <form id="chatForm">
      <input type="text" id="chatInput" placeholder="پرسش خود را وارد کنید..." autocomplete="off">
      <button type="submit" class="btn-send">ارسال</button>
    </form>
  </footer>

  <script src="app.js"></script>
</body>
</html>
